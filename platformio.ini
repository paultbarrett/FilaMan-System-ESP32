; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
version = "3.2.7-beta1"
to_old_version = "3.0.9"

##
[env:esp32dev]
platform = espressif32@^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200
#monitor_port = /dev/cu.usbmodem01

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    https://github.com/me-no-dev/ESPAsyncWebServer.git#master
    https://github.com/esphome/AsyncTCP.git
    bogde/HX711 @ ^0.7.5
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit PN532 @ ^1.3.3
    bblanchon/ArduinoJson @ ^7.3.0
    knolleary/PubSubClient @ ^2.8
    digitaldragon/SSLClient @ ^1.3.2
    
; Enable SPIFFS upload
board_build.filesystem = littlefs
; Update partition settings
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
board_build.flash_mode = dio
board_upload.flash_freq = "40m"

build_flags = 
    -Os
    -ffunction-sections
    -fdata-sections
    #-DNDEBUG
    -mtext-section-literals
    -DVERSION=\"${common.version}\"
    -DTOOLDVERSION=\"${common.to_old_version}\"
    #-DENABLE_HEAP_DEBUGGING
    -DASYNCWEBSERVER_REGEX
    #-DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    #-DOTA_DEBUG=1
    -DCONFIG_OPTIMIZATION_LEVEL_DEBUG=1
    -DBOOT_APP_PARTITION_OTA_0=1
    
    # ===== AsyncTCP Optimierungen - KRITISCH für WiFi-Stabilität =====
    # Core 1 = Arduino/App Core (nicht Core 0 = WiFi/Protocol Core!)
    # Schwere Callbacks auf Core 0 stören das WiFi-Radio
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    # Längerer ACK-Timeout für instabile Verbindungen (10s statt 5s)
    -DCONFIG_ASYNC_TCP_MAX_ACK_TIME=10000
    # Größere Queue für mehr gleichzeitige Requests
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=128
    # Mehr Stack für komplexere Callbacks (8KB statt 16KB default, spart RAM)
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    # Standard-Priorität beibehalten
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    # WDT aktivieren für Crash-Recovery (war deaktiviert!)
    -DCONFIG_ASYNC_TCP_USE_WDT=1
    
    # ===== LwIP Optimierungen für OTA-Uploads (1.5-2MB) =====
    # Schnellere Socket-Freigabe (30s statt 60s TIME_WAIT)
    -DCONFIG_LWIP_TCP_MSL=30000
    # Größerer RX-Buffer für große Uploads (8KB statt 4KB)
    -DCONFIG_LWIP_TCP_RCV_BUF_DEFAULT=8192
    # Max aktive TCP-Verbindungen (unverändert)
    -DCONFIG_LWIP_MAX_ACTIVE_TCP=16
    
extra_scripts = 
    scripts/extra_script.py

[platformio]
default_envs = esp32dev

